<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="header">
      <div>
        <h1>Sudoku</h1>
        <p class="subtitle">A simple playable Sudoku game built with HTML, CSS, and JavaScript.</p>
      </div>

      <div class="stats">
        <div>
          <span class="stat-label">Time</span>
          <span id="timer" class="stat-value">00:00</span>
        </div>
        <div>
          <span class="stat-label">Mistakes</span>
          <span id="mistakes" class="stat-value">0</span>
        </div>
      </div>
    </section>

    <section class="controls">
      <label for="difficulty">Difficulty</label>
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
        <option value="expert">Expert</option>
      </select>

      <button id="new-game" type="button">New Game</button>
      <button id="check-board" type="button">Check</button>
      <button id="solve" type="button">Solve</button>
    </section>

    <p id="status" class="status" aria-live="polite">Select a cell and enter a number.</p>

    <section class="game-layout">
      <div id="board" class="board" aria-label="Sudoku board"></div>

      <div class="side-panel">
        <div id="number-pad" class="number-pad" aria-label="Number pad"></div>
        <button id="erase" class="wide-button" type="button">Erase</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
